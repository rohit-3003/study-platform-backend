services:
  - type: web
    name: study-platform-backend
    env: docker
    plan: free
    region: singapore # Closest free-tier region to India
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
